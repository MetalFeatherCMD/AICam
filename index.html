<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THEY LIVE · SCAN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=VT323&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --red:#e8291a; --amber:#d4821a; --green:#00cc50; --white:#f5f0e8; }
html, body { width:100%; height:100%; background:#000; color:var(--white); font-family:'DM Mono',monospace; overflow:hidden; position:fixed; inset:0; }

/* ── API SCREEN ── */
#api-screen {
  position:absolute; inset:0; z-index:100;
  background:#090603; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:24px;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:8px; margin-bottom:4px; }
.logo em { color:var(--red); font-style:normal; }
.sub  { font-size:0.48rem; letter-spacing:4px; color:rgba(245,240,232,0.18); margin-bottom:28px; text-transform:uppercase; }
.card { width:100%; max-width:360px; border:1px solid rgba(245,240,232,0.07); border-radius:12px; background:rgba(255,255,255,0.02); padding:20px; display:flex; flex-direction:column; gap:13px; }
.tabs { display:flex; gap:6px; }
.tab  { flex:1; padding:7px; border-radius:6px; border:1px solid rgba(245,240,232,0.1); background:transparent; font-family:'DM Mono',monospace; font-size:0.5rem; letter-spacing:2px; text-transform:uppercase; color:rgba(245,240,232,0.25); cursor:pointer; text-align:center; transition:all 0.2s; }
.tab.on.g { border-color:#4d8af0; color:#7badf8; background:rgba(77,138,240,0.07); }
.tab.on.c { border-color:var(--red); color:#ff7b70; background:rgba(232,41,26,0.07); }
.free { font-size:0.36rem; padding:1px 4px; border-radius:2px; background:rgba(0,204,80,0.1); color:var(--green); border:1px solid rgba(0,204,80,0.22); vertical-align:middle; margin-left:3px; }
.lbl  { font-size:0.48rem; letter-spacing:3px; color:rgba(245,240,232,0.25); text-transform:uppercase; margin-bottom:4px; }
.kw   { position:relative; }
#key  { width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(245,240,232,0.1); border-radius:6px; padding:11px 38px 11px 12px; color:var(--white); font-family:'DM Mono',monospace; font-size:0.66rem; outline:none; -webkit-appearance:none; transition:border-color 0.2s; }
#key:focus { border-color:rgba(245,240,232,0.22); }
#key::placeholder { color:rgba(245,240,232,0.16); }
.eye  { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(245,240,232,0.22); cursor:pointer; font-size:0.9rem; }
.hint { font-size:0.48rem; line-height:1.85; color:rgba(245,240,232,0.18); }
.hint a { color:rgba(245,240,232,0.35); text-decoration:none; border-bottom:1px solid rgba(245,240,232,0.12); }
.go   { width:100%; padding:12px; background:var(--red); color:white; border:none; font-family:'DM Mono',monospace; font-size:0.6rem; letter-spacing:4px; text-transform:uppercase; cursor:pointer; border-radius:6px; transition:opacity 0.2s; }
.go:disabled { opacity:0.3; cursor:not-allowed; }
.aerr { font-size:0.5rem; color:var(--red); text-align:center; min-height:1em; }

/* ── SCANNER SCREEN ── */
#scanner { position:absolute; inset:0; display:none; background:#000; }

/* Video — contain so no zoom */
#video {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:contain; display:block;
}

/* Effect canvas — sized/positioned by JS to match video rect */
#fx { position:absolute; display:block; pointer-events:none; }

/* Hidden capture canvas */
#cap { display:none; }

/* Overlay — terminals sit here */
#ov { position:absolute; inset:0; pointer-events:none; z-index:10; }

/* ── TOP BAR ── */
#top {
  position:absolute; top:0; left:0; right:0; z-index:20;
  padding:max(env(safe-area-inset-top,10px),10px) 16px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  display:flex; align-items:center; justify-content:space-between;
}
.tlogo { font-family:'Bebas Neue',sans-serif; font-size:clamp(1rem,3.5vw,1.35rem); letter-spacing:5px; }
.tlogo em { color:var(--red); font-style:normal; }
.trec  { display:flex; align-items:center; gap:4px; font-size:0.44rem; letter-spacing:2px; color:var(--red); }
.rdot  { width:5px; height:5px; border-radius:50%; background:var(--red); animation:blink 1s ease infinite; }
@keyframes blink { 0%,100%{opacity:1;}50%{opacity:0.08;} }

/* ── STATUS PILL ── */
#pill {
  position:absolute; z-index:20; left:50%; transform:translateX(-50%);
  top:max(env(safe-area-inset-top,44px),44px);
  background:rgba(0,0,0,0.62); backdrop-filter:blur(8px);
  padding:4px 14px; border-radius:99px;
  font-size:0.42rem; letter-spacing:3px; text-transform:uppercase;
  color:rgba(245,240,232,0.32); white-space:nowrap;
  display:flex; align-items:center; gap:5px;
}
.pdot { width:4px; height:4px; border-radius:50%; background:currentColor; flex-shrink:0; }
#pill.analyzing { color:var(--amber); }
#pill.analyzing .pdot { animation:blink 0.5s ease infinite; }
#pill.done { color:var(--green); }

/* ── TALLY ── */
#tally { position:absolute; z-index:20; bottom:100px; left:0; right:0; display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding:0 16px; }
.tb { font-size:0.44rem; letter-spacing:1px; padding:2px 8px; border-radius:2px; border:1px solid; text-transform:uppercase; }
.tb.h { color:var(--red);   border-color:rgba(232,41,26,0.4);  background:rgba(232,41,26,0.1); }
.tb.m { color:var(--amber); border-color:rgba(212,130,26,0.4); background:rgba(212,130,26,0.08); }
.tb.s { color:var(--green); border-color:rgba(0,204,80,0.3);   background:rgba(0,204,80,0.06); }

/* ── BOTTOM BAR ── */
#bot {
  position:absolute; bottom:0; left:0; right:0; z-index:20;
  padding:14px 24px max(env(safe-area-inset-bottom,18px),18px);
  background:linear-gradient(to top,rgba(0,0,0,0.75),transparent);
  display:flex; align-items:center; justify-content:space-between;
}
/* Shutter */
#shutter {
  width:clamp(62px,15vw,70px); height:clamp(62px,15vw,70px);
  border-radius:50%; border:3px solid rgba(245,240,232,0.58);
  background:transparent; cursor:pointer; position:relative;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.12s; -webkit-appearance:none;
}
#shutter:active { transform:scale(0.9); }
.si { width:clamp(46px,10vw,52px); height:clamp(46px,10vw,52px); border-radius:50%; background:var(--white); transition:background 0.2s; }
#shutter.busy .si { background:var(--amber); }
#shutter.busy::before { content:''; position:absolute; inset:-6px; border-radius:50%; border:2px solid transparent; border-top-color:var(--amber); animation:spin 0.9s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
#shutter.done .si { background:var(--green); }

.shlbl { font-size:0.42rem; letter-spacing:2px; color:rgba(245,240,232,0.3); text-transform:uppercase; text-align:center; margin-top:4px; }
.sh-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }

/* Side buttons */
.sb { width:42px; height:42px; border-radius:50%; border:1px solid rgba(245,240,232,0.12); background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-size:0.9rem; gap:1px; -webkit-appearance:none; transition:transform 0.12s; }
.sb:active { transform:scale(0.88); }
.sb span:last-child { font-size:0.3rem; letter-spacing:1px; color:rgba(245,240,232,0.25); text-transform:uppercase; }

/* ── ERROR TOAST ── */
#err {
  position:absolute; top:66px; left:12px; right:12px; z-index:50;
  background:rgba(26,4,2,0.97); border:1px solid rgba(232,41,26,0.28);
  border-radius:8px; padding:10px 13px; display:none;
  transform:translateY(-6px); opacity:0; transition:all 0.28s cubic-bezier(0.34,1.3,0.64,1);
}
#err.show { transform:translateY(0); opacity:1; }
.etitle { font-family:'Bebas Neue',sans-serif; font-size:0.68rem; letter-spacing:3px; color:var(--red); margin-bottom:3px; }
.emsg   { font-size:0.48rem; letter-spacing:1px; line-height:1.6; color:rgba(245,240,232,0.4); }
.ekey   { margin-top:6px; font-size:0.42rem; letter-spacing:2px; color:rgba(245,240,232,0.22); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:'DM Mono',monospace; }

/* ── NUTRITION TERMINAL ── */
.term {
  position:absolute; background:rgba(0,0,0,0.93); border:1px solid rgba(0,204,80,0.5);
  border-radius:4px; padding:7px 9px; font-family:'VT323',monospace;
  font-size:clamp(0.68rem,2vw,0.88rem); line-height:1.4; pointer-events:none;
  animation:tin 0.22s ease forwards; box-shadow:0 0 10px rgba(0,204,80,0.1); overflow:hidden;
}
@keyframes tin { from{opacity:0;transform:scaleY(0.88);}to{opacity:1;transform:scaleY(1);} }
.term::after { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px); pointer-events:none; }
.th { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,204,80,0.15); padding-bottom:3px; margin-bottom:3px; }
.ttitle { font-size:0.7rem; color:var(--green); letter-spacing:2px; }
.tthreat { font-size:0.62rem; letter-spacing:2px; }
.high { color:var(--red); } .med { color:var(--amber); }
.tprod { font-size:0.65rem; color:var(--white); letter-spacing:1px; margin-bottom:3px; }
.trow  { display:flex; gap:4px; font-size:0.68rem; margin:1px 0; }
.tf    { color:var(--red); flex-shrink:0; }
.ta    { color:#ff7b70; }
.tw    { color:rgba(245,240,232,0.28); font-size:0.56rem; padding-left:11px; margin-bottom:2px; }
.tv    { margin-top:4px; padding-top:3px; border-top:1px solid rgba(245,240,232,0.07); font-size:0.56rem; color:rgba(245,240,232,0.35); line-height:1.5; }
</style>
</head>
<body>

<!-- API KEY SCREEN -->
<div id="api-screen">
  <div class="logo">THEY<em>LIVE</em></div>
  <div class="sub">Grocery Scanner · AI Vision</div>
  <div class="card">
    <div>
      <div class="lbl">AI Provider</div>
      <div class="tabs">
        <div class="tab g on" id="tg" onclick="setProv('g')">Gemini <span class="free">FREE</span></div>
        <div class="tab c"    id="tc" onclick="setProv('c')">Claude</div>
      </div>
    </div>
    <div>
      <div class="lbl" id="klbl">Gemini API Key</div>
      <div class="kw">
        <input type="password" id="key" placeholder="AIza..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="eye" onclick="toggleEye()">👁</button>
      </div>
    </div>
    <div class="hint" id="khint">
      Free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br>
      Key is sent only to Google's API — never stored.
    </div>
    <button class="go" id="gobtn" onclick="launch()">Start Scanning</button>
    <div class="aerr" id="aerr"></div>
  </div>
</div>

<!-- SCANNER -->
<div id="scanner">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx"></canvas>
  <canvas id="cap"></canvas>
  <div id="ov"></div>

  <div id="top">
    <div class="tlogo">THEY<em>LIVE</em></div>
    <div class="trec"><div class="rdot"></div>LIVE</div>
  </div>

  <div id="pill"><div class="pdot"></div><span id="pilltext">TAP SHUTTER TO SCAN</span></div>

  <div id="tally"></div>

  <div id="err">
    <div class="etitle">⚠ ERROR</div>
    <div class="emsg" id="emsg">—</div>
    <button class="ekey" onclick="goBack()">Change API Key</button>
  </div>

  <div id="bot">
    <button class="sb" onclick="flip()"><span>🔄</span><span>Flip</span></button>
    <div class="sh-wrap">
      <button id="shutter" onclick="shoot()"><div class="si"></div></button>
      <div class="shlbl" id="shlbl">SNAP &amp; SCAN</div>
    </div>
    <button class="sb" onclick="reset()"><span>✕</span><span>Clear</span></button>
  </div>
</div>

<script>
// ── CONFIG ──
let prov = 'g';   // 'g' = Gemini, 'c' = Claude
let apiKey = '';
let stream = null;
let facing = 'environment';
let busy   = false;
let products = [];

const video = document.getElementById('video');
const fx    = document.getElementById('fx');
const cap   = document.getElementById('cap');
const ov    = document.getElementById('ov');
const fxCtx = fx.getContext('2d');
const capCtx= cap.getContext('2d');

// Video rect in screen coords (set by fitFX)
let vr = {x:0,y:0,w:0,h:0};

// ── API KEY SCREEN ──
function setProv(p) {
  prov = p;
  document.getElementById('tg').classList.toggle('on', p==='g');
  document.getElementById('tc').classList.toggle('on', p==='c');
  document.getElementById('klbl').textContent  = p==='g' ? 'Gemini API Key' : 'Anthropic API Key';
  document.getElementById('key').placeholder   = p==='g' ? 'AIza...' : 'sk-ant-api03-...';
  document.getElementById('khint').innerHTML   = p==='g'
    ? 'Free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br>Key is sent only to Google\'s API — never stored.'
    : 'Key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br>Key is sent only to Anthropic\'s API — never stored.';
  document.getElementById('key').value = '';
  document.getElementById('aerr').textContent = '';
}

function toggleEye() {
  const k = document.getElementById('key');
  k.type = k.type==='password'?'text':'password';
}

async function launch() {
  const k = document.getElementById('key').value.trim();
  const err = document.getElementById('aerr');
  const btn = document.getElementById('gobtn');
  if (!k) { err.textContent='Enter your API key.'; return; }
  if (prov==='g' && !k.startsWith('AIza'))    { err.textContent='Gemini keys start with "AIza".'; return; }
  if (prov==='c' && !k.startsWith('sk-ant-')) { err.textContent='Anthropic keys start with "sk-ant-".'; return; }
  err.textContent=''; btn.disabled=true; btn.textContent='Connecting…';
  const ok = await checkKey(k);
  btn.disabled=false; btn.textContent='Start Scanning';
  if (!ok) { err.textContent='Key rejected — check it and try again.'; return; }
  apiKey = k;
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('scanner').style.display    = 'block';
  await startCam();
  startLoop();
}

async function checkKey(k) {
  try {
    if (prov==='g') return (await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`)).ok;
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:5,messages:[{role:'user',content:'hi'}]})
    });
    return r.ok||r.status===400;
  } catch(e){ return true; }
}

function goBack() {
  hideErr();
  document.getElementById('api-screen').style.display='flex';
  document.getElementById('scanner').style.display='none';
}

// ── CAMERA ──
async function startCam() {
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:facing}, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    video.srcObject = stream;
    await video.play();
    fitFX();
  } catch(e) { showErr('Camera access denied. Check permissions and reload.'); }
}

async function flip() {
  facing = facing==='environment'?'user':'environment';
  reset();
  await startCam();
}

// Compute where video is rendered (object-fit:contain) and size fx canvas to match
function fitFX() {
  const cw = video.offsetWidth  || window.innerWidth;
  const ch = video.offsetHeight || window.innerHeight;
  const vw = video.videoWidth   || 1280;
  const vh = video.videoHeight  || 720;
  if (!vw||!vh) { setTimeout(fitFX,200); return; }
  const vaR=vw/vh, caR=cw/ch;
  let rw,rh,rx,ry;
  if(vaR>caR){rw=cw;rh=cw/vaR;rx=0;ry=(ch-rh)/2;}
  else{rh=ch;rw=ch*vaR;rx=(cw-rw)/2;ry=0;}
  vr={x:rx,y:ry,w:rw,h:rh};
  fx.style.left=rx+'px'; fx.style.top=ry+'px';
  fx.style.width=rw+'px'; fx.style.height=rh+'px';
  fx.width=Math.round(rw); fx.height=Math.round(rh);
}

window.addEventListener('resize',()=>{ fitFX(); });
window.addEventListener('orientationchange',()=>setTimeout(fitFX,300));
video.addEventListener('loadedmetadata', fitFX);

// ── RENDER LOOP — just mirrors live video onto fx canvas ──
let raf=null;
let frozen=false;

function startLoop(){
  function loop(){
    raf=requestAnimationFrame(loop);
    if(frozen||video.readyState<2)return;
    const w=fx.width,h=fx.height;
    if(!w||!h)return;
    fxCtx.drawImage(video,0,0,w,h);
    if(products.length) drawOverlays(w,h);
  }
  loop();
}

// ── SHUTTER ──
async function shoot(){
  if(busy)return;

  // If showing frozen result, unfreeze and go back to live
  if(frozen){
    frozen=false;
    products=[];
    ov.innerHTML='';
    document.getElementById('tally').innerHTML='';
    document.getElementById('shutter').classList.remove('done');
    document.getElementById('shlbl').textContent='SNAP & SCAN';
    setPill('','TAP SHUTTER TO SCAN');
    return;
  }

  busy=true;
  frozen=false;
  hideErr();
  document.getElementById('shutter').classList.add('busy');
  document.getElementById('shlbl').textContent='ANALYZING…';
  setPill('analyzing','ANALYZING…');

  // Capture frame
  const vw=video.videoWidth||0, vh=video.videoHeight||0;
  if(!vw||!vh||video.readyState<2){
    done(false,'Camera not ready. Wait a moment.');
    return;
  }
  const scale=Math.min(1,960/vw);
  const cw=Math.round(vw*scale), ch=Math.round(vh*scale);
  cap.width=cw; cap.height=ch;
  capCtx.drawImage(video,0,0,cw,ch);
  const b64=cap.toDataURL('image/jpeg',0.65).split(',')[1];

  try {
    const res = prov==='g' ? await callGemini(b64) : await callClaude(b64);
    products=res;
    updateTally();
    // Bake frozen frame
    frozen=true;
    fxCtx.drawImage(video,0,0,fx.width,fx.height);
    if(products.length) drawOverlays(fx.width,fx.height);
    renderTerminals();
    document.getElementById('shutter').classList.remove('busy');
    document.getElementById('shutter').classList.add('done');
    document.getElementById('shlbl').textContent='TAP TO CLEAR';
    setPill('done', products.length ? `${products.length} PRODUCT${products.length>1?'S':''} FOUND` : 'NOTHING DETECTED');
  } catch(e){
    done(false, e.message||'Scan failed.');
  }
  busy=false;
}

function done(ok, msg){
  busy=false;
  frozen=false;
  document.getElementById('shutter').classList.remove('busy','done');
  document.getElementById('shlbl').textContent='SNAP & SCAN';
  setPill('','TAP SHUTTER TO SCAN');
  if(!ok) showErr(msg);
}

function reset(){
  frozen=false;
  products=[];
  ov.innerHTML='';
  document.getElementById('tally').innerHTML='';
  document.getElementById('shutter').classList.remove('busy','done');
  document.getElementById('shlbl').textContent='SNAP & SCAN';
  setPill('','TAP SHUTTER TO SCAN');
  hideErr();
}

// ── OVERLAYS ──
function drawOverlays(cw,ch){
  products.forEach(p=>{
    const col={
      high:  {stroke:'#e8291a',glow:'rgba(232,41,26,0.5)'},
      med:   {stroke:'#d4821a',glow:'rgba(212,130,26,0.4)'},
      low:   {stroke:'#00cc50',glow:'rgba(0,204,80,0.3)'},
      clean: {stroke:'rgba(245,240,232,0.3)',glow:'rgba(245,240,232,0.1)'},
    }[p.threat]||{stroke:'#888',glow:'rgba(128,128,128,0.2)'};

    const pts=getPath(p,cw,ch);
    if(!pts||pts.length<3)return;

    // Desaturate interior for toxic items
    if(p.threat==='high'||p.threat==='med'){
      fxCtx.save();
      fxCtx.beginPath();
      fxCtx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(([x,y])=>fxCtx.lineTo(x,y));
      fxCtx.closePath();
      fxCtx.clip();
      const xs=pts.map(q=>q[0]),ys=pts.map(q=>q[1]);
      const mx=Math.max(0,Math.floor(Math.min(...xs))),
            my=Math.max(0,Math.floor(Math.min(...ys))),
            mw=Math.min(cw,Math.ceil(Math.max(...xs)))-mx,
            mh=Math.min(ch,Math.ceil(Math.max(...ys)))-my;
      if(mw>1&&mh>1){
        try{
          const id=fxCtx.getImageData(mx,my,mw,mh);
          const d=id.data, dk=p.threat==='high'?0.5:0.7;
          for(let i=0;i<d.length;i+=4){
            const g=(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])*dk;
            d[i]=d[i+1]=d[i+2]=g;
          }
          fxCtx.putImageData(id,mx,my);
        }catch(e){}
      }
      fxCtx.restore();
    }

    // Glow stroke
    fxCtx.save();
    tracePath(pts);
    fxCtx.strokeStyle=col.glow; fxCtx.lineWidth=9; fxCtx.lineJoin='round';
    fxCtx.shadowColor=col.glow; fxCtx.shadowBlur=16;
    fxCtx.stroke();
    fxCtx.restore();

    // Crisp stroke
    fxCtx.save();
    tracePath(pts);
    fxCtx.strokeStyle=col.stroke; fxCtx.lineWidth=p.threat==='high'?2.5:1.8; fxCtx.lineJoin='round';
    fxCtx.stroke();
    fxCtx.restore();

    // Floating label above top of polygon
    if(p.threat!=='clean'){
      const xs=pts.map(q=>q[0]),ys=pts.map(q=>q[1]);
      const topPt=pts.reduce((a,b)=>b[1]<a[1]?b:a);
      const ico={high:'☠',med:'⚠',low:'○'}[p.threat]||'';
      const lbl=ico+' '+(p.brand||p.name).toUpperCase().slice(0,18);
      const fs=Math.max(9,Math.min(13,(Math.max(...xs)-Math.min(...xs))/7));
      fxCtx.save();
      fxCtx.font=`500 ${fs}px "DM Mono",monospace`;
      fxCtx.textAlign='center'; fxCtx.textBaseline='bottom';
      const tw=fxCtx.measureText(lbl).width, pd=4;
      const lx=Math.max(tw/2+pd,Math.min(cw-tw/2-pd,topPt[0]));
      const ly=Math.max(fs+pd*2,topPt[1]-6);
      fxCtx.beginPath();
      fxCtx.roundRect(lx-tw/2-pd,ly-fs-pd,tw+pd*2,fs+pd*2,3);
      fxCtx.fillStyle=p.threat==='high'?'rgba(232,41,26,0.9)':'rgba(212,130,26,0.9)';
      fxCtx.fill();
      fxCtx.fillStyle='white';
      fxCtx.fillText(lbl,lx,ly);
      fxCtx.restore();
    }
  });
}

function tracePath(pts){
  fxCtx.beginPath();
  fxCtx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(([x,y])=>fxCtx.lineTo(x,y));
  fxCtx.closePath();
}

function getPath(p,cw,ch){
  if(p.polygon&&p.polygon.length>=4)
    return p.polygon.map(([x,y])=>[x*cw,y*ch]);
  if(!p.position)return null;
  const {x,y,w,h}=p.position;
  return[[x*cw,y*ch],[( x+w)*cw,y*ch],[(x+w)*cw,(y+h)*ch],[x*cw,(y+h)*ch]];
}

// ── NUTRITION TERMINALS ──
function renderTerminals(){
  ov.innerHTML='';
  const flagged=products
    .filter(p=>p.flags&&p.flags.length&&p.position&&(p.threat==='high'||p.threat==='med'))
    .sort((a,b)=>['high','med'].indexOf(a.threat)-['high','med'].indexOf(b.threat))
    .slice(0,3);

  const sw=window.innerWidth, sh=window.innerHeight;

  flagged.forEach(p=>{
    const pos=p.position;
    const px=vr.x+pos.x*vr.w, py=vr.y+pos.y*vr.h;
    const pw=pos.w*vr.w,       ph=pos.h*vr.h;
    const tw=Math.max(150,Math.min(pw,210));
    const fcount=Math.min(p.flags.length,4);
    const estH=52+fcount*32+32;
    let lx=px+3, ly=py+20;
    if(lx+tw>sw-6) lx=Math.max(4,sw-tw-6);
    if(ly+estH>sh-110) ly=Math.max(py-estH-2,4);

    const tword=p.threat==='high'?'⚠ DANGER':'⚠ WARNING';
    const tcls=p.threat==='high'?'high':'med';
    const rows=p.flags.slice(0,4).map(f=>{
      const why=WHY[f]||'Potentially harmful substance';
      return `<div class="trow"><span class="tf">!</span><span class="ta">${f}</span></div>`
            +`<div class="tw">${why}</div>`;
    }).join('');

    const el=document.createElement('div');
    el.className='term';
    el.style.cssText=`left:${Math.round(lx)}px;top:${Math.round(ly)}px;width:${Math.round(tw)}px`;
    el.innerHTML=`
      <div class="th"><span class="ttitle">// SCAN</span><span class="tthreat ${tcls}">${tword}</span></div>
      <div class="tprod">${p.name}</div>
      ${rows}
      <div class="tv">${p.verdict}</div>`;
    ov.appendChild(el);
  });
}

// ── AI CALLS ──
function repairJSON(txt){
  try{JSON.parse(txt);return txt;}catch(e){}
  let out=txt.replace(/,\s*$/,'');
  const ob=(out.match(/\{/g)||[]).length-(out.match(/\}/g)||[]).length;
  const ab=(out.match(/\[/g)||[]).length-(out.match(/\]/g)||[]).length;
  for(let i=0;i<ab;i++)out+=']';
  for(let i=0;i<ob;i++)out+='}';
  return out;
}

const SYS=`You are a toxicity-analysis AI in a grocery store scanner app.
Analyse the image. Identify every visible consumer product (food, drinks, cleaning products, laundry, personal care, household chemicals, etc).
For each product assess toxicity of its known ingredients/chemicals.

Return ONLY raw valid JSON, no markdown:
{"products":[{"name":"...","brand":"...","threat":"high|med|low|clean","flags":["Substance"],"verdict":"One sentence.","position":{"x":0.0,"y":0.0,"w":0.0,"h":0.0},"polygon":[[x,y],[x,y],...]}]}

Rules:
- position: 0-1 fractions (x=left,y=top,w=width,h=height)
- polygon: 6-8 [x,y] points tracing product silhouette clockwise, 0-1 fractions. Be accurate to the product shape.
- threat: high=carcinogens/endocrine disruptors, med=concerning, low=minor, clean=none
- flags: Red 40, Yellow 5, Yellow 6, Blue 1, BHT, BHA, TBHQ, HFCS, Sodium Benzoate, Potassium Bromate, Carrageenan, Aspartame, Caramel Color 4-MEI, Azodicarbonamide, MSG, Titanium Dioxide, Acesulfame-K, Sucralose, Sodium Lauryl Sulfate, Sodium Laureth Sulfate, 1,4-Dioxane, Quaternary Ammonium Compounds, Chlorine Bleach, Formaldehyde Releasers, Triclosan, Artificial Fragrance, Phthalates, Parabens, Oxybenzone, PFAS, Bisphenol A (BPA)
- No products visible: {"products":[]}`;

async function callGemini(b64){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  let res;
  try{ res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    system_instruction:{parts:[{text:SYS}]},
    contents:[{role:'user',parts:[{inline_data:{mime_type:'image/jpeg',data:b64}},{text:'Identify all products. Return JSON only.'}]}],
    generationConfig:{temperature:0.1,maxOutputTokens:8000}
  })}); }catch(e){ throw new Error('Network error — check connection.'); }

  const data=await res.json().catch(()=>null);
  if(!res.ok){
    const m=data?.error?.message||`Gemini ${res.status}`;
    if(res.status===429) throw new Error('Rate limit — wait 60s and try again.');
    if(res.status===404) throw new Error('Model not found — contact support.');
    throw new Error(m);
  }
  if(!data?.candidates?.length){
    const br=data?.promptFeedback?.blockReason||'no candidates';
    throw new Error(`Blocked: ${br}`);
  }
  let txt=data.candidates[0]?.content?.parts?.[0]?.text||'';
  txt=txt.trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  if(!txt) throw new Error('Empty response from Gemini.');
  txt=repairJSON(txt);
  try{ return JSON.parse(txt).products||[]; }
  catch(e){ throw new Error(`Parse error: ${txt.slice(0,100)}`); }
}

async function callClaude(b64){
  let res;
  try{ res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:SYS,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:'Identify all products. Return JSON only.'}
      ]}]
    })
  }); }catch(e){ throw new Error('Network error — check connection.'); }

  const data=await res.json().catch(()=>null);
  if(!res.ok){
    if(res.status===401) throw new Error('Invalid API key.');
    if(res.status===429) throw new Error('Rate limit — wait a moment.');
    throw new Error(data?.error?.message||`Claude ${res.status}`);
  }
  let txt=(data?.content||[]).map(b=>b.text||'').join('').trim();
  txt=txt.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  txt=repairJSON(txt);
  try{ return JSON.parse(txt).products||[]; }
  catch(e){ throw new Error(`Parse error: ${txt.slice(0,100)}`); }
}

function setPill(cls,txt){
  const p=document.getElementById('pill');
  p.className=cls;
  document.getElementById('pilltext').textContent=txt;
}

function updateTally(){
  const t=document.getElementById('tally');
  t.innerHTML='';
  const h=products.filter(p=>p.threat==='high').length;
  const m=products.filter(p=>p.threat==='med').length;
  const s=products.filter(p=>p.threat==='low'||p.threat==='clean').length;
  if(h)t.innerHTML+=`<span class="tb h">☠ ${h} TOXIC</span>`;
  if(m)t.innerHTML+=`<span class="tb m">⚠ ${m} CAUTION</span>`;
  if(s)t.innerHTML+=`<span class="tb s">✓ ${s} OK</span>`;
}

function showErr(msg){
  const e=document.getElementById('err');
  document.getElementById('emsg').textContent=msg;
  e.style.display='block';
  requestAnimationFrame(()=>e.classList.add('show'));
  clearTimeout(window._et);
  window._et=setTimeout(hideErr,12000);
}
function hideErr(){
  const e=document.getElementById('err');
  e.classList.remove('show');
  setTimeout(()=>{e.style.display='none';},300);
}
